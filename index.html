<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#101014">
  <title>京都検定2級 四択トレーニング</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css?v=3.0.0">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TKL5WQJBSB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TKL5WQJBSB');
  </script>
</head>

<body>
<div class="app">

  <!-- ========================= -->
  <!-- ① 設定画面 -->
  <!-- ========================= -->
  <main id="screen-start" class="screen">
    <header class="app-header">
      <p class="app-eyebrow">KYOTO KENTEI — GRADE 2</p>
      <h1 class="app-title">京都検定2級<span class="app-title-sub">四択トレーニング</span></h1>
      <p class="app-lead">回次・出題範囲・出題問数を選んで開始します。</p>
    </header>

    <!-- 回次 -->
    <section class="panel" aria-labelledby="exam-heading">
      <div class="panel-head">
        <h2 id="exam-heading" class="panel-title">回次</h2>
        <p class="panel-note">1つ選択</p>
      </div>

      <div class="chip-group" role="radiogroup" aria-labelledby="exam-heading">
        <input type="radio" id="exam-all" name="exam" value="all" checked>
        <label class="chip chip-wide" for="exam-all">全部（12〜25回）</label>

        <input type="radio" id="exam-12" name="exam" value="12">
        <label class="chip" for="exam-12">第12回</label>

        <input type="radio" id="exam-13" name="exam" value="13">
        <label class="chip" for="exam-13">第13回</label>

        <input type="radio" id="exam-14" name="exam" value="14">
        <label class="chip" for="exam-14">第14回</label>

        <input type="radio" id="exam-15" name="exam" value="15">
        <label class="chip" for="exam-15">第15回</label>

        <input type="radio" id="exam-16" name="exam" value="16">
        <label class="chip" for="exam-16">第16回</label>

        <input type="radio" id="exam-17" name="exam" value="17">
        <label class="chip" for="exam-17">第17回</label>

        <input type="radio" id="exam-19" name="exam" value="19">
        <label class="chip" for="exam-19">第19回</label>

        <input type="radio" id="exam-21" name="exam" value="21">
        <label class="chip" for="exam-21">第21回</label>

        <input type="radio" id="exam-23" name="exam" value="23">
        <label class="chip" for="exam-23">第23回</label>

        <input type="radio" id="exam-25" name="exam" value="25">
        <label class="chip" for="exam-25">第25回</label>
      </div>
    </section>

    <!-- 出題範囲 -->
    <section class="panel" aria-labelledby="range-heading">
      <div class="panel-head">
        <h2 id="range-heading" class="panel-title">出題範囲</h2>
        <p class="panel-note">複数選択可</p>
        <button type="button" id="range-toggle-btn" class="btn-ghost btn-small">すべて解除</button>
      </div>
      <p class="panel-desc">問題番号の範囲を選びます。初期状態では全範囲が選択されています。</p>

      <div class="chip-group" role="group" aria-labelledby="range-heading">
        <input type="checkbox" id="range-01-10" name="range" value="1-10" checked>
        <label class="chip" for="range-01-10">1〜10</label>

        <input type="checkbox" id="range-11-20" name="range" value="11-20" checked>
        <label class="chip" for="range-11-20">11〜20</label>

        <input type="checkbox" id="range-21-30" name="range" value="21-30" checked>
        <label class="chip" for="range-21-30">21〜30</label>

        <input type="checkbox" id="range-31-40" name="range" value="31-40" checked>
        <label class="chip" for="range-31-40">31〜40</label>

        <input type="checkbox" id="range-41-50" name="range" value="41-50" checked>
        <label class="chip" for="range-41-50">41〜50</label>

        <input type="checkbox" id="range-51-60" name="range" value="51-60" checked>
        <label class="chip" for="range-51-60">51〜60</label>

        <input type="checkbox" id="range-61-70" name="range" value="61-70" checked>
        <label class="chip" for="range-61-70">61〜70</label>

        <input type="checkbox" id="range-71-80" name="range" value="71-80" checked>
        <label class="chip" for="range-71-80">71〜80</label>

        <input type="checkbox" id="range-81-90" name="range" value="81-90" checked>
        <label class="chip" for="range-81-90">81〜90</label>

        <input type="checkbox" id="range-91-100" name="range" value="91-100" checked>
        <label class="chip" for="range-91-100">91〜100</label>
      </div>
    </section>

    <!-- 出題問数 -->
    <section class="panel" aria-labelledby="count-heading">
      <div class="panel-head">
        <h2 id="count-heading" class="panel-title">出題問数</h2>
        <p class="panel-note">1つ選択</p>
      </div>

      <div class="chip-group" role="radiogroup" aria-labelledby="count-heading">
        <input type="radio" id="count-20" name="count" value="20" checked>
        <label class="chip" for="count-20">20問</label>

        <input type="radio" id="count-10" name="count" value="10">
        <label class="chip" for="count-10">10問</label>

        <input type="radio" id="count-5" name="count" value="5">
        <label class="chip" for="count-5">5問</label>

        <input type="radio" id="count-3" name="count" value="3">
        <label class="chip" for="count-3">3問</label>

        <input type="radio" id="count-2" name="count" value="2">
        <label class="chip" for="count-2">2問</label>

        <input type="radio" id="count-1" name="count" value="1">
        <label class="chip" for="count-1">1問</label>
      </div>
    </section>

    <div id="start-error" class="alert" role="alert" hidden></div>

    <button id="start-btn" type="button" class="btn-primary btn-block">開始する</button>
  </main>

  <!-- ========================= -->
  <!-- ② 出題画面 -->
  <!-- ========================= -->
  <main id="screen-quiz" class="screen" hidden>
    <div class="quiz-top">
      <p id="question-meta" class="quiz-meta"></p>
      <p id="question-counter" class="quiz-counter" aria-live="polite"></p>
    </div>

    <div class="progress" role="progressbar" aria-label="進捗"
         aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <article class="panel quiz-panel">
      <h2 id="question-text" class="question-text" tabindex="-1"></h2>

      <div id="answer-area" class="answer-area"></div>

      <p class="quiz-hint" aria-hidden="true">キー 1〜4 で選択 ／ Enter で次へ</p>

      <button id="next-btn" type="button" class="btn-primary btn-block">次へ</button>
    </article>
  </main>

  <!-- ========================= -->
  <!-- ③ 結果画面 -->
  <!-- ========================= -->
  <main id="screen-result" class="screen" hidden>
    <header class="result-head">
      <p class="app-eyebrow">RESULT</p>
      <h2 class="panel-title-lg">結果</h2>
    </header>

    <section class="panel score-panel" aria-labelledby="score">
      <p id="score" class="score-line"></p>
      <div class="score-detail">
        <p id="score-percent" class="score-percent"></p>
        <p id="score-sub" class="score-sub"></p>
      </div>
    </section>

    <section aria-label="各問題の結果">
      <ol id="result-list" class="result-list"></ol>
    </section>

    <button id="back-to-start-btn" type="button" class="btn-secondary btn-block">スタート画面に戻る</button>
  </main>

  <footer class="app-footer">
    <p>京都検定2級 四択トレーニング</p>
  </footer>
</div>

<script src="app.js?v=3.0.0"></script>
</body>
</html>
